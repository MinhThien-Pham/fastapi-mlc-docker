services:
  web:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - .:/app
      - mlc_workspace:/workspace
    environment:
      # Override any of these with: docker compose run -e VAR=value web
      - BUILD_ACTION=${BUILD_ACTION:-full}
      - CUDA_ARCH=${CUDA_ARCH:-86}
      - TVM_SOURCE=${TVM_SOURCE:-bundled}
      - BUILD_WHEELS=${BUILD_WHEELS:-y}
      - MLC_DEVICE=${MLC_DEVICE:-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mlc_workspace:
